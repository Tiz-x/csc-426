<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Issue - IRO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <a href="index.html" class="logo">IRO</a>
    <nav>
      <ul class="tabs">
        <li><a href="index.html">Home</a></li>
        <li><a href="report.html" class="active">Report Issue</a></li>
        <li><a href="status.html">Track Report</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1 class="page-title">Report an Issue</h1>

    <form id="reportForm">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" required />
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="">-- Select Category --</option>
          <option value="Student">Student</option>
          <option value="Indigene">Indigene</option>
        </select>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required />
      </div>

      <div class="form-group">
        <label for="email">Email (optional)</label>
        <input type="email" id="email" name="email" />
      </div>

      <div class="form-group">
        <label for="issueType">Type of Issue</label>
        <select id="issueType" name="issueType" required>
          <option value="">-- Select Issue Type --</option>
          <option value="Security">Security</option>
          <option value="Roads">Roads</option>
          <option value="Water">Water</option>
          <option value="Electricity">Electricity</option>
          <option value="School">School</option>
          <option value="Environment">Environment</option>
          <option value="Others">Others</option>
        </select>
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" required />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" required></textarea>
      </div>

      <div class="form-group">
        <label for="image">Upload Image</label>
        <input type="file" id="image" name="image" accept="image/*" />
      </div>

      <button type="submit" class="btn">Submit</button>
    </form>
  </main>

  <footer>
    &copy; 2026 IRO - Issues Reporting Outlet, AAUA
  </footer>

  <script src="script.js"></script>
</body>
</html>
