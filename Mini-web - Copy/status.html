<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Report - IRO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <a href="index.html" class="logo">IRO</a>
    <nav>
      <ul class="tabs">
        <li><a href="index.html">Home</a></li>
        <li><a href="report.html">Report Issue</a></li>
        <li><a href="status.html" class="active">Track Report</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="status-box">
      <h1 class="page-title">Track Your Report</h1>

      <form id="trackForm">
        <div class="form-group">
          <label for="reportId">Report ID</label>
          <input type="text" id="reportId" name="reportId" placeholder="e.g. IRO-2026-0001" required />
        </div>
        <button type="submit" class="btn">Check Status</button>
      </form>

      <div class="perforation"></div>

      <div class="status-result" id="statusResult">
        <h2>Report Status</h2>
        <ul class="status-list">
          <li class="done">Received</li>
          <li class="done">Under Review</li>
          <li>Resolved</li>
        </ul>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 IRO - Issues Reporting Outlet, AAUA
  </footer>

  <script src="script.js"></script>
</body>
</html>
